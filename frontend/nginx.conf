server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets on the fly.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Long-cache the hashed build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA routing: serve index.html for any unmatched path so client-side
    # routes (e.g. /manage-admin) work on a hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
